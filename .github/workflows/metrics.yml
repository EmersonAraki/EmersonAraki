name: GitHub Metrics

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  github-metrics:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Generate Metrics
        uses: lowlighter/metrics@latest

        with:
          token: ${{ secrets.PERSONAL_ACCESS_TOKEN }}

          user: ${{ github.repository_owner }}

          filename: output/metrics.svg

          base: header, activity, community, repositories, metadata

          config_timezone: America/Sao_Paulo
          config_display: large
          config_octicon: yes

          plugins_errors_fatal: no

          output_action: commit
          committer_branch: main
          committer_message: "Generate GitHub metrics"

          # Languages
          plugin_languages: yes
          plugin_languages_ignored: html, css
          plugin_languages_limit: 12
          plugin_languages_sections: most-used
          plugin_languages_details: bytes-size, percentage
          plugin_languages_analysis_timeout: 15
          plugin_languages_analysis_timeout_repositories: 7.5
          plugin_languages_categories: programming
          plugin_languages_recent_categories: programming
          plugin_languages_recent_days: 365
          plugin_languages_recent_load: 300
          plugin_languages_recent_repositories: 50

          # Achievements
          plugin_achievements: yes
          plugin_achievements_threshold: C
          plugin_achievements_display: compact
          plugin_achievements_secrets: yes

          # Habits
          plugin_habits: yes
          plugin_habits_days: 365
          plugin_habits_facts: yes
          plugin_habits_charts: yes
          plugin_habits_trim: yes

          # Contribution calendar
          plugin_isocalendar: yes
          plugin_isocalendar_duration: full-year

          # Follow-up
          plugin_followup: yes
          plugin_followup_indepth: yes

          # Lines changed
          plugin_lines: yes

          # Notable contributions
          plugin_notable: yes
          plugin_notable_repositories: yes
          plugin_notable_types: commit

          # Traffic
          plugin_traffic: yes

          # Stars
          plugin_stargazers: yes

          # Repositories
          plugin_repositories: yes
          plugin_repositories_featured: emersonmanabuaraki/emersonmanabuaraki

          # Discussions
          plugin_discussions: yes
          plugin_discussions_categories: yes

          # Topics
          plugin_topics: yes
          plugin_topics_limit: 20

          # Stars history
          plugin_stars: yes

          # Activity
          plugin_activity: yes
          plugin_activity_days: 365
          plugin_activity_filter: all
          plugin_activity_limit: 10

          # People
          plugin_people: yes
          plugin_people_limit: 24
          plugin_people_types: followers, following

          # Gists
          plugin_gists: yes
